<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFARIS MOTORS - Booking</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">ALFARIS MOTORS</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cars.html">Cars</a></li>
                <li><a href="car-details.html">Details</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="media.html">Media</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button id="themeButton" class="theme-button">Dark Theme</button>
        </nav>
    </header>

    <main>
        <section class="page-title">
            <h2>Book a Car Viewing</h2>
            <p>Fill in this form to request a showroom visit.</p>
        </section>

        <section class="form-section">
            <form id="bookingForm" novalidate>
                <label for="bookingName">Full Name</label>
                <input type="text" id="bookingName">
                <p class="error" id="bookingNameError"></p>

                <label for="bookingEmail">Email</label>
                <input type="email" id="bookingEmail">
                <p class="error" id="bookingEmailError"></p>

                <label for="bookingCar">Choose Car</label>
                <select id="bookingCar">
                    <option value="">Select a car</option>
                    <option>BMW M4</option>
                    <option>Mercedes GLC</option>
                    <option>Toyota Corolla</option>
                    <option>Honda Civic</option>
                    <option>Audi A6</option>
                    <option>Kia Sportage</option>
                </select>
                <p class="error" id="bookingCarError"></p>

                <label for="bookingDate">Viewing Date</label>
                <input type="date" id="bookingDate">
                <p class="error" id="bookingDateError"></p>

                <button type="submit" class="main-button">Submit Booking</button>
                <p class="success" id="bookingSuccess"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ALFARIS MOTORS. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
